{% extends "application/main.html" %}

{% block content %}
<div class="max-h-400 mt-25 flex items-center justify-center">

<div class="text-2xl flex flex-col bg-zinc-900 rounded-2xl border p-15 relative">
<a class="w-fit h-fit bg-red-800 hover:scale-105 duration-300 delay-200 ease-in-out rounded-3xl p-2 top-3 right-3 absolute" href={% url 'update_deck' deck.id %}><svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 20 20" fill="currentColor" class=" size-5">
  <path d="M6.28 5.22a.75.75 0 0 0-1.06 1.06L8.94 10l-3.72 3.72a.75.75 0 1 0 1.06 1.06L10 11.06l3.72 3.72a.75.75 0 1 0 1.06-1.06L11.06 10l3.72-3.72a.75.75 0 0 0-1.06-1.06L10 8.94 6.28 5.22Z" />
</svg>
</a>
    <div>  
<p class="item-center justify-center text-center text-3xl mb-6">Add Card</p>



</div>
    
<form class="" action="" method="POST" autocompleate="off">
    {% csrf_token %}
    <p class="text-2xl p-3">Question: </p>
    <p class="p-1 mb-1.5 border bg-zinc-800 rounded-md">{{form.question}}</p>

    <p class="text-2xl p-3">Answer: </p>
    <p class="p-1 border bg-zinc-800 rounded-md">{{form.answer}}</p>

    <div class=" mt-10 mr-8 ml-8 items-center justify-center bg-zinc-800 border text-center rounded-2xl hover:scale-105 transition-all ease-in-out duration-300 delay-100">
        <input class=" p-2 cursor-pointer  w-full h-ful" type="submit" value="SUBMIT" name="submit">
    </div>

</form>

</div>
</div>
