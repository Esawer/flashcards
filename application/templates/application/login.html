{% extends "application/main.html" %} 
{% block content %}

<div class="max-h-400 mt-15 flex items-center justify-center">

<div class="text-2xl flex flex-col bg-zinc-900 rounded-2xl border p-15 relative">
<a class="w-fit h-fit bg-red-800 hover:scale-105 duration-300 delay-200 ease-in-out rounded-3xl absolute p-2 top-3 right-3" href={% url 'home'%}><svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 20 20" fill="currentColor" class=" size-5">
  <path d="M6.28 5.22a.75.75 0 0 0-1.06 1.06L8.94 10l-3.72 3.72a.75.75 0 1 0 1.06 1.06L10 11.06l3.72 3.72a.75.75 0 1 0 1.06-1.06L11.06 10l3.72-3.72a.75.75 0 0 0-1.06-1.06L10 8.94 6.28 5.22Z" />
</svg>
</a>
    <div>  
<p class="item-center justify-center text-center text-3xl mb-3">Login</p>
</div>
    
<form class="" action="" method="POST" autocompleate="off">
    {% csrf_token %}
    <p class="text-2xl p-3">Username: </p>
    <p class="mx-auto h-max w-max p-1 border bg-zinc-800 rounded-md"><input type="text" name="username" required></p>

    <p class="text-2xl p-3">Password: </p>
        <p class="mx-auto h-max w-max p-1 border bg-zinc-800 rounded-md"><input type="password"  name="password" placeholder="" required></p>
        <p class="text-lg mt-4"><a href="{% url "register_page" %}">You don't have an account - Regiser here</a>.        
        {% if form.errors %}
        Error
        {% endif %}</p>
    <div class=" mt-6 mr-8 ml-8 items-center justify-center bg-zinc-800 border text-center rounded-2xl hover:scale-105 transition-all ease-in-out duration-300 delay-100">
        <input class=" p-2 cursor-pointer  w-full h-ful" type="submit" value="SUBMIT" name="submit">
    </div>
    {{form.errors}}

</form>

</div>
</div>


{% endblock %}
