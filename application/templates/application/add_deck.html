{% extends "application/main.html" %}

{% block content %}
<div class="max-h-400 mt-5 flex items-center justify-center">

<div class="text-2xl flex flex-col bg-zinc-900 rounded-2xl border p-15 relative">

    <div>

</div>

    {% csrf_token %}

    <p class="text-2xl p-3">Sub-Name: </p>
    <p class="p-1 border h-fit w-fit bg-zinc-800 rounded-md">{{form.sub_name}}</p>

    <div class="flex text-2xl p-3">Upload Deck<div class="group hover:scale-105 duration-200 delay-75 relative transition-all ease-in-out"><svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="size-6">

</svg>
<div class="pointer-events-none opacity-0 text-2xl p-3 absolute group-hover:opacity-90 rounded-xl translate-y-1 ease-out transition group-hover:translate-y-0 delay-100 bg-zinc-800 duration-500">txt file only: <br>question;answer<br>question;answer</div> 
    </div>:</div>

        <input class=" p-2 cursor-pointer  w-full h-ful" type="submit" value="SUBMIT" name="submit">
    </div>

</form>

</div>
</div>
